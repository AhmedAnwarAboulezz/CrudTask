services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: CrudTaskDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/CrudTask.API/Dockerfile
    ports:
      - "5211:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=CrudTaskDb;Username=postgres;Password=postgres"
      Auth__Authority: "https://accounts.google.com"
      Auth__Audience: "379286327162-ifjv0jdqn185ko7q6ss9t8fv5aatncjp.apps.googleusercontent.com"
      Cors__AllowedOrigins: "http://localhost:4200"
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: src/CrudTask.API/Dockerfile
      target: migrate
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=CrudTaskDb;Username=postgres;Password=postgres"
      Auth__Authority: "https://accounts.google.com"
      Auth__Audience: "379286327162-ifjv0jdqn185ko7q6ss9t8fv5aatncjp.apps.googleusercontent.com"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  client:
    build:
      context: CrudTask.Client
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  postgres_data:
